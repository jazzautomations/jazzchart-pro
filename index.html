
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JazzChart Pro | Elite Music Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Instrument+Sans:wght@400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050507;
      --panel: #0f0f13;
      --paper: #ffffff;
      --accent: #3b82f6;
      --ai: #8b5cf6;
    }
    body { 
      font-family: 'Instrument Sans', sans-serif; 
      background-color: var(--bg);
      color: #fafafa;
      margin: 0;
      padding: 0;
    }
    .chord-root { font-family: 'Bebas Neue', cursive; line-height: 0.9; }
    .chord-ext { font-family: 'Crimson Pro', serif; font-weight: 700; }
    
    .sheet-paper {
      background: var(--paper);
      box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8), 0 0 1px 1px rgba(255,255,255,0.05);
      border-radius: 6px;
      position: relative;
    }

    .glass-panel {
      background: rgba(15, 15, 19, 0.75);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .sidebar-transition {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    input[type="range"] {
      -webkit-appearance: none;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }

    @keyframes pulse-soft {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(0.98); }
    }
    .animate-pulse-soft { animation: pulse-soft 2s infinite ease-in-out; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
